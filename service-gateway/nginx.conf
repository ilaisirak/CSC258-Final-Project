# Edge API gateway / authorization layer for the cluster.
#
# Plays the "Authorization Layer" role: terminates the public HTTP
# listener, validates JWTs via auth_request against service-auth,
# injects identity headers, and forwards to each backend over mTLS as
# the "service-gateway" client cert. The SPA itself lives in
# service-frontend (static nginx) and is reverse-proxied for "/".

# mTLS client material for all upstream proxy_pass calls.
proxy_ssl_certificate     /etc/svc-certs/service-gateway.crt;
proxy_ssl_certificate_key /etc/svc-certs/service-gateway.key;
proxy_ssl_trusted_certificate /etc/svc-certs/ca.crt;
proxy_ssl_verify          on;
proxy_ssl_verify_depth    2;

server {
  listen 80;
  server_name _;

  # ─────────────────────────────────────────────────────────────────
  # SPA — reverse-proxied from service-frontend (plain HTTP, internal).
  # ─────────────────────────────────────────────────────────────────
  location / {
    proxy_pass http://service-frontend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ─────────────────────────────────────────────────────────────────
  # API GATEWAY / AUTHORIZATION LAYER
  # ─────────────────────────────────────────────────────────────────
  # 1. Token validation — `auth_request /_auth_verify` runs a
  #    subrequest to service-auth/auth/verify on every protected
  #    /api/* call and rejects 401/403 before the upstream is hit.
  # 2. Identity injection — on 200 the verified identity is captured
  #    via auth_request_set and forwarded as X-Auth-User-* request
  #    headers so backends never see the JWT.
  # 3. mTLS — every upstream is HTTPS, and proxy_ssl_certificate*
  #    makes nginx present the gateway client cert. Backends require
  #    a CA-signed client cert, so direct traffic from anywhere else
  #    in the cluster is rejected at the TLS layer.
  #
  # Public auth endpoints (login, refresh, logout, register) bypass
  # auth_request because authentication is what they implement.

  # Internal subrequest target. Not reachable from outside; used only
  # by `auth_request /_auth_verify` below. Body is suppressed so nginx
  # only forwards the inbound Authorization header.
  location = /_auth_verify {
    internal;
    proxy_pass https://service-auth:8000/auth/verify;
    proxy_ssl_name service-auth;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
  }

  # Public auth endpoints — no auth_request, otherwise login is impossible.
  location /api/auth {
    proxy_pass https://service-auth:8000;
    proxy_ssl_name service-auth;
    rewrite ^/api(/.*)$ $1 break;
    proxy_set_header Host $host;
    # Strip any caller-supplied identity headers so they cannot be
    # smuggled into the backend.
    proxy_set_header X-Auth-User-Id    "";
    proxy_set_header X-Auth-User-Role  "";
    proxy_set_header X-Auth-User-Name  "";
    proxy_set_header X-Auth-User-Email "";
  }

  location /api/users {
    auth_request /_auth_verify;
    auth_request_set $auth_user_id    $upstream_http_x_auth_user_id;
    auth_request_set $auth_user_role  $upstream_http_x_auth_user_role;
    auth_request_set $auth_user_name  $upstream_http_x_auth_user_name;
    auth_request_set $auth_user_email $upstream_http_x_auth_user_email;

    proxy_pass https://service-user:8000;
    proxy_ssl_name service-user;
    rewrite ^/api(/.*)$ $1 break;
    proxy_set_header Host $host;
    proxy_set_header X-Auth-User-Id    $auth_user_id;
    proxy_set_header X-Auth-User-Role  $auth_user_role;
    proxy_set_header X-Auth-User-Name  $auth_user_name;
    proxy_set_header X-Auth-User-Email $auth_user_email;
  }

  # Roster paths under /api/classes/{id}/roster* go to
  # service-enrollment, not service-class. Regex location takes
  # precedence over the /api/classes prefix below.
  location ~ ^/api/classes/[^/]+/roster {
    auth_request /_auth_verify;
    auth_request_set $auth_user_id    $upstream_http_x_auth_user_id;
    auth_request_set $auth_user_role  $upstream_http_x_auth_user_role;
    auth_request_set $auth_user_name  $upstream_http_x_auth_user_name;
    auth_request_set $auth_user_email $upstream_http_x_auth_user_email;

    rewrite ^/api(/.*)$ $1 break;
    proxy_pass https://service-enrollment:8000;
    proxy_ssl_name service-enrollment;
    proxy_set_header Host $host;
    proxy_set_header X-Auth-User-Id    $auth_user_id;
    proxy_set_header X-Auth-User-Role  $auth_user_role;
    proxy_set_header X-Auth-User-Name  $auth_user_name;
    proxy_set_header X-Auth-User-Email $auth_user_email;
  }

  location /api/enrollments {
    auth_request /_auth_verify;
    auth_request_set $auth_user_id    $upstream_http_x_auth_user_id;
    auth_request_set $auth_user_role  $upstream_http_x_auth_user_role;
    auth_request_set $auth_user_name  $upstream_http_x_auth_user_name;
    auth_request_set $auth_user_email $upstream_http_x_auth_user_email;

    proxy_pass https://service-enrollment:8000;
    proxy_ssl_name service-enrollment;
    rewrite ^/api(/.*)$ $1 break;
    proxy_set_header Host $host;
    proxy_set_header X-Auth-User-Id    $auth_user_id;
    proxy_set_header X-Auth-User-Role  $auth_user_role;
    proxy_set_header X-Auth-User-Name  $auth_user_name;
    proxy_set_header X-Auth-User-Email $auth_user_email;
  }

  location /api/classes {
    auth_request /_auth_verify;
    auth_request_set $auth_user_id    $upstream_http_x_auth_user_id;
    auth_request_set $auth_user_role  $upstream_http_x_auth_user_role;
    auth_request_set $auth_user_name  $upstream_http_x_auth_user_name;
    auth_request_set $auth_user_email $upstream_http_x_auth_user_email;

    proxy_pass https://service-class:8000;
    proxy_ssl_name service-class;
    rewrite ^/api(/.*)$ $1 break;
    proxy_set_header Host $host;
    proxy_set_header X-Auth-User-Id    $auth_user_id;
    proxy_set_header X-Auth-User-Role  $auth_user_role;
    proxy_set_header X-Auth-User-Name  $auth_user_name;
    proxy_set_header X-Auth-User-Email $auth_user_email;
  }

  # Composition view of assignments goes to service-bff;
  # falls through to service-assignment for the plain /assignments CRUD.
  location ~ ^/api/assignments/for-student {
    auth_request /_auth_verify;
    auth_request_set $auth_user_id    $upstream_http_x_auth_user_id;
    auth_request_set $auth_user_role  $upstream_http_x_auth_user_role;
    auth_request_set $auth_user_name  $upstream_http_x_auth_user_name;
    auth_request_set $auth_user_email $upstream_http_x_auth_user_email;

    rewrite ^/api(/.*)$ $1 break;
    proxy_pass https://service-bff:8000;
    proxy_ssl_name service-bff;
    proxy_set_header Host $host;
    proxy_set_header X-Auth-User-Id    $auth_user_id;
    proxy_set_header X-Auth-User-Role  $auth_user_role;
    proxy_set_header X-Auth-User-Name  $auth_user_name;
    proxy_set_header X-Auth-User-Email $auth_user_email;
  }

  location /api/assignments {
    auth_request /_auth_verify;
    auth_request_set $auth_user_id    $upstream_http_x_auth_user_id;
    auth_request_set $auth_user_role  $upstream_http_x_auth_user_role;
    auth_request_set $auth_user_name  $upstream_http_x_auth_user_name;
    auth_request_set $auth_user_email $upstream_http_x_auth_user_email;

    proxy_pass https://service-assignment:8000;
    proxy_ssl_name service-assignment;
    rewrite ^/api(/.*)$ $1 break;
    proxy_set_header Host $host;
    proxy_set_header X-Auth-User-Id    $auth_user_id;
    proxy_set_header X-Auth-User-Role  $auth_user_role;
    proxy_set_header X-Auth-User-Name  $auth_user_name;
    proxy_set_header X-Auth-User-Email $auth_user_email;
  }

  location /api/submissions {
    auth_request /_auth_verify;
    auth_request_set $auth_user_id    $upstream_http_x_auth_user_id;
    auth_request_set $auth_user_role  $upstream_http_x_auth_user_role;
    auth_request_set $auth_user_name  $upstream_http_x_auth_user_name;
    auth_request_set $auth_user_email $upstream_http_x_auth_user_email;

    proxy_pass https://service-submission:8000;
    proxy_ssl_name service-submission;
    rewrite ^/api(/.*)$ $1 break;
    proxy_set_header Host $host;
    proxy_set_header X-Auth-User-Id    $auth_user_id;
    proxy_set_header X-Auth-User-Role  $auth_user_role;
    proxy_set_header X-Auth-User-Name  $auth_user_name;
    proxy_set_header X-Auth-User-Email $auth_user_email;
  }

  location /api/grading {
    auth_request /_auth_verify;
    auth_request_set $auth_user_id    $upstream_http_x_auth_user_id;
    auth_request_set $auth_user_role  $upstream_http_x_auth_user_role;
    auth_request_set $auth_user_name  $upstream_http_x_auth_user_name;
    auth_request_set $auth_user_email $upstream_http_x_auth_user_email;

    proxy_pass https://service-grade-records:8000;
    proxy_ssl_name service-grade-records;
    rewrite ^/api(/.*)$ $1 break;
    proxy_set_header Host $host;
    proxy_set_header X-Auth-User-Id    $auth_user_id;
    proxy_set_header X-Auth-User-Role  $auth_user_role;
    proxy_set_header X-Auth-User-Name  $auth_user_name;
    proxy_set_header X-Auth-User-Email $auth_user_email;
  }

  # Per-student / per-professor composition endpoints live
  # in service-bff.
  location /api/students {
    auth_request /_auth_verify;
    auth_request_set $auth_user_id    $upstream_http_x_auth_user_id;
    auth_request_set $auth_user_role  $upstream_http_x_auth_user_role;
    auth_request_set $auth_user_name  $upstream_http_x_auth_user_name;
    auth_request_set $auth_user_email $upstream_http_x_auth_user_email;

    proxy_pass https://service-bff:8000;
    proxy_ssl_name service-bff;
    rewrite ^/api(/.*)$ $1 break;
    proxy_set_header Host $host;
    proxy_set_header X-Auth-User-Id    $auth_user_id;
    proxy_set_header X-Auth-User-Role  $auth_user_role;
    proxy_set_header X-Auth-User-Name  $auth_user_name;
    proxy_set_header X-Auth-User-Email $auth_user_email;
  }

  location /api/professors {
    auth_request /_auth_verify;
    auth_request_set $auth_user_id    $upstream_http_x_auth_user_id;
    auth_request_set $auth_user_role  $upstream_http_x_auth_user_role;
    auth_request_set $auth_user_name  $upstream_http_x_auth_user_name;
    auth_request_set $auth_user_email $upstream_http_x_auth_user_email;

    proxy_pass https://service-bff:8000;
    proxy_ssl_name service-bff;
    rewrite ^/api(/.*)$ $1 break;
    proxy_set_header Host $host;
    proxy_set_header X-Auth-User-Id    $auth_user_id;
    proxy_set_header X-Auth-User-Role  $auth_user_role;
    proxy_set_header X-Auth-User-Name  $auth_user_name;
    proxy_set_header X-Auth-User-Email $auth_user_email;
  }

  location /api/views {
    auth_request /_auth_verify;
    auth_request_set $auth_user_id    $upstream_http_x_auth_user_id;
    auth_request_set $auth_user_role  $upstream_http_x_auth_user_role;
    auth_request_set $auth_user_name  $upstream_http_x_auth_user_name;
    auth_request_set $auth_user_email $upstream_http_x_auth_user_email;

    proxy_pass https://service-bff:8000;
    proxy_ssl_name service-bff;
    rewrite ^/api(/.*)$ $1 break;
    proxy_set_header Host $host;
    proxy_set_header X-Auth-User-Id    $auth_user_id;
    proxy_set_header X-Auth-User-Role  $auth_user_role;
    proxy_set_header X-Auth-User-Name  $auth_user_name;
    proxy_set_header X-Auth-User-Email $auth_user_email;
  }
}
