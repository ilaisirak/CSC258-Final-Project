# Static SPA only. All API gateway / auth_request / mTLS responsibilities
# live in service-gateway. This container is cluster-internal and is
# reached only via the gateway's reverse-proxy for "/".
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long cache for hashed asset bundles.
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — let React Router handle unknown paths.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
