server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long cache for hashed assets
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — let React Router handle unknown paths
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse-proxy /api to the cluster ingress (override at deploy time)
  # location /api/ {
  #   proxy_pass http://ingress-nginx-controller.ingress-nginx.svc.cluster.local/;
  # }
# }

  # ── API proxy (docker-compose dev) ──────────────────────
  location /api/users {
    proxy_pass http://service-user:8000;
    rewrite ^/api(/.*)$ $1 break;
    proxy_set_header Host $host;
  }

  location /api/classes {
    proxy_pass http://service-class:8000;
    rewrite ^/api(/.*)$ $1 break;
    proxy_set_header Host $host;
  }

  location /api/assignments {
    proxy_pass http://service-assignment:8000;
    rewrite ^/api(/.*)$ $1 break;
    proxy_set_header Host $host;
  }

  location /api/submissions {
    proxy_pass http://service-submission:8000;
    rewrite ^/api(/.*)$ $1 break;
    proxy_set_header Host $host;
  }

  location /api/submit {
    proxy_pass http://service-submission:8000;
    rewrite ^/api(/.*)$ $1 break;
    proxy_set_header Host $host;
  }

  location /api/grading {
    proxy_pass http://service-grading:8000;
    rewrite ^/api(/.*)$ $1 break;
    proxy_set_header Host $host;
  }
}