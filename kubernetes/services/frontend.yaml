apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      client_max_body_size 50m;

      location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /api/users {
        proxy_pass http://service-user:80;
        rewrite ^/api(/.*)$ $1 break;
        proxy_set_header Host $host;
      }
      location /api/classes {
        proxy_pass http://service-class:80;
        rewrite ^/api(/.*)$ $1 break;
        proxy_set_header Host $host;
      }
      location /api/assignments {
        proxy_pass http://service-assignment:80;
        rewrite ^/api(/.*)$ $1 break;
        proxy_set_header Host $host;
      }
      location /api/submissions {
        proxy_pass http://service-submission:80;
        rewrite ^/api(/.*)$ $1 break;
        proxy_set_header Host $host;
      }
      location /api/submit {
        proxy_pass http://service-submission:80;
        rewrite ^/api(/.*)$ $1 break;
        proxy_set_header Host $host;
      }
      location /api/grading {
        proxy_pass http://service-grading:80;
        rewrite ^/api(/.*)$ $1 break;
        proxy_set_header Host $host;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-frontend
  labels:
    app: service-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-frontend
  template:
    metadata:
      labels:
        app: service-frontend
    spec:
      containers:
        - name: service-frontend
          image: grading-portal/service-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: frontend-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: service-frontend
spec:
  selector:
    app: service-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP