# Deployment responsible for running and scaling service-user
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-user   # Name of the deployment
spec:
  replicas: 2               # Adjust based on load requirements
  selector:
    matchLabels:
      app: service-user  # Connects deployment to the pods it manages

  template:
    metadata:
      labels:
        app: service-user  # Label used for service discovery
    spec:
      containers:
      - name: service-user
        image: service-user:latest  # Docker image to run

        imagePullPolicy: IfNotPresent     # Tells Kubernetes to use local Kind-loaded images

        ports:
        - containerPort: 8000  # FastAPI's port

---

# Service routes traffic to the service-user pods
apiVersion: v1
kind: Service
metadata:
  name: service-user  # Network name for the service
spec:
  selector:
    app: service-user  # Routes traffic to pods with this label

  ports:
    - port: 80          # Port exposed inside the cluster
      targetPort: 8000  # Forwards traffic to container port

  type: ClusterIP       # Internal-only access (not exposed to internet)