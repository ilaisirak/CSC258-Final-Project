# Deployment responsible for running and scaling service-assignment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-assignment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-assignment
  template:
    metadata:
      labels:
        app: service-assignment
    spec:
      containers:
      - name: service-assignment
        image: service-assignment:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://dev:devpassword@assignment-db:5432/assignments"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
# Service routes traffic to the service-assignment pods
apiVersion: v1
kind: Service
metadata:
  name: service-assignment
spec:
  selector:
    app: service-assignment
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP