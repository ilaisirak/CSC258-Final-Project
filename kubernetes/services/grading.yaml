# Deployment responsible for running and scaling service-grading
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-grading
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-grading
  template:
    metadata:
      labels:
        app: service-grading
    spec:
      containers:
      - name: service-grading
        image: service-grading:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://dev:devpassword@grading-db:5432/grades"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
# Service routes traffic to the service-grading pods
apiVersion: v1
kind: Service
metadata:
  name: service-grading
spec:
  selector:
    app: service-grading
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP