# Deployment responsible for running and scaling service-submission
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-submission
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-submission
  template:
    metadata:
      labels:
        app: service-submission
    spec:
      containers:
      - name: service-submission
        image: service-submission:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://dev:devpassword@submission-db:5432/submissions"
        - name: MINIO_ENDPOINT
          value: "minio:9000"            # internal MinIO service (see minio.yaml)
        - name: MINIO_ACCESS_KEY
          value: "minioadmin"
        - name: MINIO_SECRET_KEY
          value: "minioadmin"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
# Service routes traffic to the service-submission pods
apiVersion: v1
kind: Service
metadata:
  name: service-submission
spec:
  selector:
    app: service-submission
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP