# Deployment responsible for running and scaling service-class
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-class
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-class
  template:
    metadata:
      labels:
        app: service-class
    spec:
      containers:
      - name: service-class
        image: service-class:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://dev:devpassword@class-db:5432/classes"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
# Service routes traffic to the service-class pods
apiVersion: v1
kind: Service
metadata:
  name: service-class
spec:
  selector:
    app: service-class
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP