# Kubernetes Secret holding service-auth's signing material.
#
# AUTH_SECRET: HMAC secret used by service-auth to sign access tokens
#              and to validate them via /auth/verify. ONLY service-auth
#              reads this; peer services trust gateway-injected
#              X-Auth-User-* headers instead, so this Secret is bound
#              to the service-auth Deployment only.
#
# JWT_LIFETIME_SECONDS: Access token lifetime in seconds (15 minutes).
# REFRESH_LIFETIME_SECONDS: Refresh token lifetime (7 days).
#
# Production: replace AUTH_SECRET with a strong random value
#             (`openssl rand -hex 32`) and consider migrating to a
#             managed secret store (Vault / cloud KMS).
#
# NOTE: The Kubernetes manifests in this directory intentionally do NOT
# enable mTLS between pods — that would normally be supplied by a
# service mesh (Linkerd / Istio). The docker-compose deployment in this
# repo is the canonical security demo; see scripts/gen-certs.ps1.
apiVersion: v1
kind: Secret
metadata:
  name: auth-secret
type: Opaque
stringData:
  AUTH_SECRET: "dev-only-change-me-please-32bytes-min"
  JWT_LIFETIME_SECONDS: "900"
  REFRESH_LIFETIME_SECONDS: "604800"
