apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: submission-db
spec:
  serviceName: submission-db   # must match the Service name
  replicas: 1                  # single primary; read replicas would be separate
  selector:
    matchLabels:
      app: submission-db
  template:
    metadata:
      labels:
        app: submission-db
    spec:
      containers:
      - name: postgres
        image: postgres:16
        ports:
        - containerPort: 5432
          name: postgres
        envFrom:
        - secretRef:
            name: submission-db-secret
        # Optional: set additional PG settings
        env:
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "dev", "-d", "submissions"]
          initialDelaySeconds: 10
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi   # adjust size