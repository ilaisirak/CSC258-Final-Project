apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: enrollment-db
spec:
  serviceName: enrollment-db
  replicas: 1
  selector:
    matchLabels:
      app: enrollment-db
  template:
    metadata:
      labels:
        app: enrollment-db
    spec:
      containers:
      - name: postgres
        image: postgres:16
        ports:
        - containerPort: 5432
          name: postgres
        envFrom:
        - secretRef:
            name: enrollment-db-secret
        env:
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "dev", "-d", "enrollment"]
          initialDelaySeconds: 10
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
